services:
  postgres:
    image: postgres:latest
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_pass
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/init/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    environment:
      KEY: ${KEY:-change_me_in_production}
      ALGORITHM: ${ALGORITHM:-HS256}
      JWT_HOURS: ${JWT_HOURS:-10}
      POSTGRES_USER: postgres_user
      POSTGRES_PASS: postgres_pass
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/docs || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
