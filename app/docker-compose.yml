services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      # URL do backend externo — sobrescreva aqui ou via .env
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    # Monta o código-fonte para hot-reload em desenvolvimento
    volumes:
      - .:/app
      - /app/node_modules
